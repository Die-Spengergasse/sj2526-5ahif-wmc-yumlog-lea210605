name: Deploy YumLog Full-Stack App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Build and Test Frontend
  build-frontend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: 'Accessability/yumlog.webapp-main/package-lock.json'
    
    - name: Install dependencies (Frontend)
      working-directory: ./Accessability/yumlog.webapp-main
      run: npm ci
    
    - name: Build Frontend
      working-directory: ./Accessability/yumlog.webapp-main
      run: npm run build
      env:
        VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:3000' }}
    
    - name: Upload frontend build
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: Accessability/yumlog.webapp-main/dist

  # Job 2: Build and Test Backend
  build-backend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: 'Accessability/yumlog.api-main/package-lock.json'
    
    - name: Install dependencies (Backend)
      working-directory: ./Accessability/yumlog.api-main
      run: npm ci
    
    - name: Test Backend (Health Check)
      working-directory: ./Accessability/yumlog.api-main
      run: |
        timeout 5 npm start &
        sleep 2
        curl -f http://localhost:3000/api/health || true

  # Job 3: Deploy Frontend to Vercel
  deploy-frontend:
    needs: build-frontend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download frontend build
      uses: actions/download-artifact@v4
      with:
        name: frontend-build
        path: Accessability/yumlog.webapp-main/dist
    
    - name: Deploy to Vercel
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: Accessability/yumlog.webapp-main
        production: true
