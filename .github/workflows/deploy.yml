name: Deploy YumLog Full-Stack App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Test und Build Frontend
  build-frontend:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'
    
    - name: Install dependencies (Frontend)
      working-directory: ./Accessability/yumlog.webapp-main
      run: npm ci
    
    - name: Build Frontend
      working-directory: ./Accessability/yumlog.webapp-main
      run: npm run build
      env:
        VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:3000' }}
    
    - name: Upload frontend build
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: Accessability/yumlog.webapp-main/dist
  
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: 'Accessability/yumlog.api-main/package-lock.json'
    
    - name: Install dependencies (Backend)
      working-directory: ./Accessability/yumlog.api-main
      run: npm ci
    
    - name: Test Backend (Health Check)
      working-directory: ./Accessability/yumlog.api-main
      run: |
        timeout 5 npm start &
        sleep 2
        curl -f http://localhost:3000/api/health || true
  
  # Job 3: Docker Build & Push (optional)
  build-docker:
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Backend Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./Accessability/yumlog.api-main
        file: ./Accessability/yumlog.api-main/Dockerfile
        push: false
        tags: yumlog-api:latest
        outputs: type=docker,dest=/tmp/backend-image.tar
    
    - name: Build Frontend Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./Accessability/yumlog.webapp-main
        file: ./Accessability/yumlog.webapp-main/Dockerfile
        push: false
        tags: yumlog-webapp:latest
        outputs: type=docker,dest=/tmp/frontend-image.tar
  
  # Job 4: Deploy zu Vercel (nur bei main)
  deploy-frontend:
    needs: build-frontend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download frontend build
      uses: actions/download-artifact@v4
      with:
        name: frontend-build
        path: Accessability/yumlog.webapp-main/dist
    
    - name: Deploy to Vercel
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: Accessability/yumlog.webapp-main
        production: true
